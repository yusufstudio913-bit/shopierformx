app = "shopierformx"
primary_region = "ams" # Gaziantep'e yakın bir bölge (örn: FRA veya OTP)

[build]
  # Dockerfile veya buildpack ayarlarınız buraya gelir

[[mounts]]
  source = "volume"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
